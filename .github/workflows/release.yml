name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: ckg
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: ckg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: ckg.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-manual}"
          package="ckg-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && 7z a "${package}.zip" "${package}")
          else
            tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ckg-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lah dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
